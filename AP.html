<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Arshia 🎂</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 48px;
      animation: fadeIn 2s ease-in-out;
    }

    p {
      font-size: 20px;
      margin-top: 10px;
      opacity: 0;
      animation: fadeIn 3s ease-in-out forwards;
      animation-delay: 1.5s;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff6f91;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ffe0e6;
    }

    .float {
      position: absolute;
      bottom: -50px;
      font-size: 22px;
      opacity: 0.8;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0);
        opacity: 0.8;
      }
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div>
  <h1>Happy Birthday, Arshia 🎉</h1>
  <p>Wishing you a beautiful day filled with happiness and smiles 💫</p>
  <button onclick="showMessage()">Tap for a wish 💌</button>
</div>

<script>
function showMessage() {
  alert("Hope this year brings you everything you truly deserve ✨");
}

// Floating hearts & balloons
const items = ["💖", "🎈"];

for (let i = 0; i < 25; i++) {
  let el = document.createElement("div");
  el.className = "float";
  el.innerHTML = items[Math.floor(Math.random() * items.length)];
  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (5 + Math.random() * 5) + "s";
  el.style.fontSize = (18 + Math.random() * 10) + "px";
  document.body.appendChild(el);
}
</script>

</body>
</html>
